<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>MemeOverlay</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700&display=swap');

    :root {
      --media-max-w: 40vw;
      --media-max-h: 45vh;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent !important;
      overflow: hidden;
    }

    #overlay {
      position: fixed;
      inset: 0;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    #overlay.visible { opacity: 1; }

    #overlay.pos-tl { align-items: flex-start;  justify-content: flex-start; }
    #overlay.pos-t  { align-items: center;       justify-content: flex-start; }
    #overlay.pos-tr { align-items: flex-end;     justify-content: flex-start; }
    #overlay.pos-l  { align-items: flex-start;  justify-content: center;     }
    #overlay.pos-c  { align-items: center;       justify-content: center;     }
    #overlay.pos-r  { align-items: flex-end;     justify-content: center;     }
    #overlay.pos-bl { align-items: flex-start;  justify-content: flex-end;   }
    #overlay.pos-b  { align-items: center;       justify-content: flex-end;   }
    #overlay.pos-br { align-items: flex-end;     justify-content: flex-end;   }

    #media-wrap {
      max-width: var(--media-max-w);
      max-height: var(--media-max-h);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
      isolation: isolate;
    }

    #media-wrap img {
      display: block;
      max-width: var(--media-max-w);
      max-height: var(--media-max-h);
      width: auto;
      height: auto;
      object-fit: contain;
    }

    #media-wrap video {
      display: block;
      width: 560px;
      height: 315px;
      max-width: var(--media-max-w);
      max-height: var(--media-max-h);
      object-fit: contain;
      background: transparent;
      transition: opacity 0.2s ease;
    }

    #caption {
      margin-top: 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.06em;
      color: #fff;
      text-align: center;
      max-width: 42vw;
      line-height: 1.05;
      text-shadow:
        3px  3px 0 #000, -3px -3px 0 #000,
        3px -3px 0 #000, -3px  3px 0 #000,
        0    3px 0 #000,  0   -3px 0 #000,
        3px  0   0 #000, -3px  0   0 #000;
      animation: fadeUp 0.35s 0.15s ease both;
    }

    @keyframes popIn {
      from { transform: scale(0.55) translateY(20px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }
    @keyframes fadeUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.9); }
    }
    .hiding { animation: fadeOut 0.3s ease forwards !important; }
  </style>
</head>
<body>

  <div id="overlay" class="pos-c">
    <div id="media-wrap"></div>
    <div id="caption"></div>
  </div>

  <script>
    const POSITIONS = ["tl","t","tr","l","c","r","bl","b","br"];
    const SIZE_MAP = {
      small:    { w: "25vw",  h: "30vh"  },
      medium:   { w: "40vw",  h: "45vh"  },
      large:    { w: "65vw",  h: "70vh"  },
      original: { w: "90vw",  h: "85vh"  },
    };

    let paused    = false;
    let volume    = 1.0;
    let mediaSize = "medium";

    const queue   = [];
    let isShowing = false;

    function applySize() {
      const s = SIZE_MAP[mediaSize] || SIZE_MAP.medium;
      document.documentElement.style.setProperty("--media-max-w", s.w);
      document.documentElement.style.setProperty("--media-max-h", s.h);
    }

    window.electron.onPause((val) => { paused = val; });

    window.electron.onCloseMeme(() => hideMeme());

    window.electron.onUpdateSettings((settings) => {
      if (settings.volume    != null) volume    = settings.volume;
      if (settings.mediaSize != null) { mediaSize = settings.mediaSize; applySize(); }
    });

    async function init() {
      const config = await window.electron.getConfig();
      if (config.volume    != null) volume    = config.volume;
      if (config.mediaSize != null) { mediaSize = config.mediaSize; applySize(); }

      const userId = await window.electron.getUserId();
      const socket = io();

      socket.on("connect", () => {
        if (userId) socket.emit("identify", userId);
      });

      socket.on("meme", (payload) => {
        if (paused) return;
        if (payload.mediaType === "emote-wall") showEmoteWall(payload);
        else enqueue(payload);
      });
    }

    function enqueue(payload) {
      if (!isShowing) {
        showMeme(payload);
      } else {
        queue.push(payload);
      }
    }

    function processQueue() {
      isShowing = false;
      if (queue.length > 0) {
        setTimeout(() => showMeme(queue.shift()), 400);
      }
    }

    function playSound() {
      const ctx  = new AudioContext();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.4 * volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.6);
    }

    function showMeme({ mediaUrl, mediaType, text, senderName, duration = 2, position = "c", sound = false, start = 0 }) {
      isShowing = true;
      const overlay = document.getElementById("overlay");

      POSITIONS.forEach(p => overlay.classList.remove(`pos-${p}`));
      overlay.classList.add(`pos-${POSITIONS.includes(position) ? position : "c"}`);

      const wrap = document.getElementById("media-wrap");
      wrap.innerHTML = "";
      wrap.style.display = "";

      if (mediaType === "youtube-stream") { mediaUrl = window.location.origin + mediaUrl; mediaType = "video"; }
      if (mediaType === "youtube-audio")  { mediaUrl = window.location.origin + mediaUrl; mediaType = "audio"; }

      if (mediaType === "audio") {
        const a = document.createElement("audio");
        a.src = mediaUrl;
        a.autoplay = true;
        a.muted = false;
        a.volume = volume;
        if (start > 0) a.addEventListener("loadedmetadata", () => { a.currentTime = start; }, { once: true });
        a.addEventListener("error", () => console.error("Audio error:", a.error?.code, a.src));
        wrap.appendChild(a);
        a.play().catch(e => console.error("Audio autoplay blocked:", e));
        wrap.style.display = "none";

      } else if (mediaType === "video") {
        const v = document.createElement("video");
        v.src = mediaUrl;
        v.autoplay = true;
        v.loop = true;
        v.muted = false;
        v.volume = volume;
        v.playsInline = true;
        v.style.opacity = "0";
        if (start > 0) v.addEventListener("loadedmetadata", () => { v.currentTime = start; }, { once: true });
        v.addEventListener("canplay",  () => { v.style.opacity = "1"; }, { once: true });
        v.addEventListener("error",    () => console.error("Video error:", v.error?.code, v.error?.message, v.src));
        wrap.appendChild(v);
        v.play().catch(e => console.error("Autoplay blocked:", e));

      } else if (mediaType === "image") {
        const img = document.createElement("img");
        img.src = mediaUrl;
        wrap.appendChild(img);
      }

      const cap = document.getElementById("caption");
      cap.textContent = text || "";
      cap.style.display = text ? "block" : "none";

      overlay.classList.remove("hiding");
      overlay.classList.add("visible");

      if (sound) playSound();

      clearTimeout(window._autoClose);
      window._autoClose = setTimeout(hideMeme, duration * 1000);
    }

    function hideMeme() {
      clearTimeout(window._autoClose);
      const overlay = document.getElementById("overlay");
      overlay.classList.add("hiding");
      setTimeout(() => {
        overlay.classList.remove("visible", "hiding");
        document.getElementById("media-wrap").innerHTML = "";
        processQueue();
      }, 300);
    }

    function showEmoteWall({ mediaUrl, text, count = 40, duration = 8 }) {
      document.getElementById("emote-wall-container")?.remove();

      const container = document.createElement("div");
      container.id = "emote-wall-container";
      container.style.cssText = "position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999;";
      document.body.appendChild(container);

      const W = window.innerWidth;
      const H = window.innerHeight;
      const GRAVITY  = 0.38;
      const BOUNCE   = 0.60;
      const FRICTION = 0.978;
      const particles = [];

      for (let i = 0; i < count; i++) {
        const size = 48 + Math.random() * 40;
        let el;

        if (mediaUrl) {
          el = document.createElement("img");
          el.src = mediaUrl;
          el.style.cssText = `position:absolute;width:${size}px;height:${size}px;object-fit:contain;border-radius:6px;`;
        } else {
          el = document.createElement("span");
          el.textContent = text || "💥";
          el.style.cssText = `position:absolute;font-size:${size}px;line-height:1;user-select:none;`;
        }
        el.style.opacity = "0";
        container.appendChild(el);

        particles.push({
          el, size,
          active: false,
          activateAt: (i / count) * Math.min(duration * 0.55, 3.5),
          x: Math.random() * (W - size),
          y: -size - Math.random() * 300,
          vx: (Math.random() - 0.5) * 9,
          vy: 1.5 + Math.random() * 4,
          rot: Math.random() * 360,
          vrot: (Math.random() - 0.5) * 9,
        });
      }

      const startTime = performance.now();

      function tick(now) {
        const elapsed     = (now - startTime) / 1000;
        const fadeStart   = duration - 1.5;
        const globalAlpha = elapsed > fadeStart ? Math.max(0, (duration - elapsed) / 1.5) : 1;

        for (const p of particles) {
          if (!p.active) {
            if (elapsed >= p.activateAt) p.active = true;
            else continue;
          }

          p.vy  += GRAVITY;
          p.vx  *= FRICTION;
          p.x   += p.vx;
          p.y   += p.vy;
          p.rot += p.vrot;
          p.vrot *= 0.996;

          if (p.x < 0)          { p.x = 0;          p.vx =  Math.abs(p.vx) * BOUNCE; }
          if (p.x > W - p.size) { p.x = W - p.size; p.vx = -Math.abs(p.vx) * BOUNCE; }
          if (p.y > H - p.size) {
            p.y  = H - p.size;
            p.vy = -Math.abs(p.vy) * BOUNCE;
            p.vx *= FRICTION;
            if (Math.abs(p.vy) < 0.8) p.vy = 0;
          }

          p.el.style.transform = `translate(${p.x}px,${p.y}px) rotate(${p.rot}deg)`;
          p.el.style.opacity   = globalAlpha;
        }

        if (elapsed < duration) requestAnimationFrame(tick);
        else container.remove();
      }

      requestAnimationFrame(tick);
    }

    init();
  </script>
</body>
</html>
